<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Custom cursor dot (hidden when cursor:"default") -->
  <div id="cursor-dot"></div>

  <!-- Profile card — built by script.js -->
  <main id="app"></main>

  <!-- Music player — shown only when music.enabled = true -->
  <div id="music-player" hidden>
    <button id="music-btn" title="Play / Pause">
      <svg id="icon-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" hidden><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="music-info">
      <span id="music-title-el"></span>
    </div>
    <div class="music-bars" id="music-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <audio id="audio-el" loop></audio>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
